  <style>
    :root{--bg:#090b10;--text:#edf0ec;--muted:#a3a89f;--line:rgba(209,218,201,.16);--cold:#c9d4d1;--ember:#a64f4f}*{box-sizing:border-box}html{background:var(--bg)}body{min-height:100vh;margin:0;overflow:hidden;color:var(--text);font-family:Inter,"Segoe UI","Microsoft YaHei",sans-serif;background:radial-gradient(circle at 82% 12%,rgba(61,74,70,.28),transparent 30%),radial-gradient(circle at 18% 88%,rgba(95,35,38,.18),transparent 32%),var(--bg);animation:arrive .55s ease both}body:before{content:"";position:fixed;inset:0;pointer-events:none;opacity:.34;background-image:linear-gradient(rgba(255,255,255,.025) 1px,transparent 1px),linear-gradient(90deg,rgba(255,255,255,.018) 1px,transparent 1px);background-size:38px 38px;mask-image:linear-gradient(to bottom,black,transparent 78%)}.wrap{width:min(980px,calc(100% - 36px));margin:auto}.nav{height:64px;display:flex;align-items:center;justify-content:space-between}.mark{color:#c8cec6;font-size:.8rem;font-weight:800;letter-spacing:.18em}.back{color:var(--muted);font-size:.82rem;text-decoration:none}.back:hover{color:var(--text)}main{min-height:calc(100vh - 64px);display:grid;place-items:center;padding:18px 0 64px}.hero{width:100%;display:grid;grid-template-columns:1.42fr .58fr;align-items:center;gap:46px}.eyebrow{margin-bottom:16px;color:#88918a;font-size:.72rem;font-weight:800;letter-spacing:.2em}.eyebrow i{display:inline-block;width:7px;height:7px;margin-right:9px;border-radius:50%;background:#a65151;box-shadow:0 0 14px #a65151}h1{margin:0 0 22px;font-size:clamp(3.1rem,6.6vw,5.9rem);line-height:.92;letter-spacing:-.09em}.identity{position:relative;display:grid;justify-items:start;gap:3px;margin-bottom:22px;font-size:clamp(1rem,2vw,1.24rem);font-weight:760;letter-spacing:.06em}.erased{position:relative;color:#657069}.erased:after{content:"";position:absolute;left:-8px;right:-9px;top:50%;height:8px;background:linear-gradient(90deg,transparent,#17191b 5%,#08090a 17%,#30332d 83%,transparent);transform:rotate(-2deg);box-shadow:0 1px 0 rgba(255,255,255,.12)}.true-name{position:relative;margin-left:33px;color:#e7eee8;text-shadow:0 0 24px rgba(203,220,211,.18)}.true-name:before{content:"";position:absolute;left:-20px;top:50%;width:13px;border-top:1px solid #9da69d}.line{width:min(420px,100%);height:1px;margin:26px 0;background:linear-gradient(90deg,rgba(214,224,214,.55),transparent)}.copy{max-width:540px;margin:0;color:var(--muted);font-size:1rem;line-height:1.9}.quote{margin-top:30px;color:#cbd2ca;font-size:.85rem;letter-spacing:.12em}.portrait-shell{position:relative;justify-self:end;width:min(255px,58vw);aspect-ratio:4/5;padding:8px;background:linear-gradient(145deg,rgba(208,219,209,.55),rgba(54,62,58,.12) 44%,rgba(157,62,62,.35));box-shadow:0 24px 70px rgba(0,0,0,.46);transform:rotate(2deg)}.portrait-shell:before{content:"";position:absolute;inset:-14px;border:1px solid rgba(213,221,211,.17);transform:rotate(-6deg)}.portrait-shell:after{content:"作者覆写";position:absolute;right:-28px;bottom:22px;padding:6px 9px;border:1px solid rgba(212,220,211,.26);color:#b9c0b8;background:rgba(9,11,16,.74);font-size:.63rem;letter-spacing:.18em;transform:rotate(-90deg)}.portrait{display:block;width:100%;height:100%;object-fit:cover;filter:grayscale(.8) saturate(.45) contrast(1.2) brightness(.68)}.portrait-note{position:absolute;left:-18px;bottom:-20px;color:#858c84;font-size:.68rem;letter-spacing:.15em}.fracture{position:absolute;inset:0;pointer-events:none;background:linear-gradient(113deg,transparent 0 46%,rgba(239,245,238,.23) 46.2% 46.5%,transparent 46.7% 100%),linear-gradient(67deg,transparent 0 68%,rgba(239,245,238,.12) 68.2% 68.4%,transparent 68.6% 100%);mix-blend-mode:screen}@keyframes arrive{from{opacity:0;filter:brightness(.38)}to{opacity:1;filter:none}}@media(max-width:720px){body{overflow:auto}.wrap{width:min(100% - 28px,980px)}main{min-height:calc(100vh - 64px);padding:30px 0 58px}.hero{grid-template-columns:1fr;gap:42px}.portrait-shell{justify-self:start;order:-1;width:min(220px,62vw)}h1{font-   <style>
